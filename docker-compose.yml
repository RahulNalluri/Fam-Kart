services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-familykart}
      POSTGRES_USER: ${POSTGRES_USER:-familykart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-familykart}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-familykart} -d ${POSTGRES_DB:-familykart}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: "true"
      CORS_ORIGINS: '["*"]'
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-familykart}:${POSTGRES_PASSWORD:-familykart}@postgres:5432/${POSTGRES_DB:-familykart}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
